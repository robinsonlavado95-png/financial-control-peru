name: Generar Reporte Financiero Automático

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Ejecutar script
      run: |
        python -c "
        import csv, os
        def get_data(file):
            s, i, t = 0, 0, 0
            if os.path.exists(file):
                with open(file, 'r', encoding='utf-8') as f:
                    for row in csv.DictReader(f):
                        s += float(row.get('Subtotal') or 0)
                        i += float(row.get('IGV') or 0)
                        t += float(row.get('Total') or 0)
            return s, i, t
        vs, vi, vt = get_data('data/ventas.csv')
        cs, ci, ct = get_data('data/compras.csv')
        util = vs - cs
        igv_neto = vi - ci
        with open('README.md', 'w', encoding='utf-8') as f:
            f.write(f'# Reporte Financiero\n\n| Concepto | Ventas | Compras |\n|---|---|---|\n| Subtotal | {vs:,.2f} | {cs:,.2f} |\n\nIGV Neto: {igv_neto:,.2f}')
        "
    - name: Guardar reporte
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Actualizar reporte automático" || echo "Sin cambios"
        git push
