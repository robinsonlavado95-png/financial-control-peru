name: Generar Reporte Financiero

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Procesar y Escribir
        run: |
          python -c "
          import csv, os
          def get_sum(file):
              s, i, t = 0, 0, 0
              if os.path.exists(file):
                  with open(file, 'r', encoding='utf-8') as f:
                      for r in csv.DictReader(f):
                          s += float(r.get('Subtotal') or 0)
                          i += float(r.get('IGV') or 0)
                          t += float(r.get('Total') or 0)
              return s, i, t
          vs, vi, vt = get_sum('data/ventas.csv')
          cs, ci, ct = get_sum('data/compras.csv')
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(f'# Reporte Financiero\n\n| Concepto | Ventas | Compras |\n|---|---|---|\n| Subtotal | {vs:,.2f} | {cs:,.2f} |\n\nIGV Neto a pagar: {vi-ci:,.2f}')
          "
      - name: Push cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update" || echo "Sin cambios"
          git push origin HEAD:main
